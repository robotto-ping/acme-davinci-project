<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME | Secure Auth Console</title>

    <script src="https://assets.pingone.eu/davinci/latest/davinci.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #09090b;
            color: #fafafa;
        }

        .glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .dvWidget {
            margin-top: 1.5rem;
        }

        /* Customize DaVinci Widget to fit our dark theme if needed */
        #widget-container:empty {
            display: none;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-zone"
        class="w-full max-w-md border border-zinc-800 bg-zinc-900/50 p-8 rounded-2xl backdrop-blur-sm glow">

        <div class="flex items-center gap-2 mb-8">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="font-bold tracking-tighter text-xl uppercase">Acme Console</h1>
        </div>

        <div id="loading-state" class="text-center py-8">
            <div
                class="inline-block w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin">
            </div>
            <p class="text-zinc-500 text-xs mt-4 uppercase tracking-[0.2em]">Verifying Session...</p>
        </div>

        <div id="guest-state" class="hidden">
            <div class="mb-8">
                <h2 class="text-xl text-emerald-400 mb-2">Authentication Required</h2>
                <p class="text-zinc-400 text-sm">Please sign in to access the secure backend-for-frontend environment.
                </p>
            </div>
            <button id="loginBtn"
                class="w-full py-4 bg-emerald-500 text-black font-bold rounded-lg transition-all active:scale-95 hover:bg-emerald-400 hover:shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                LAUNCH DAVINCI
            </button>
        </div>

        <div id="auth-state" class="hidden">
            <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-lg mb-6">
                <p class="text-emerald-400 text-sm font-medium">✓ Secure Session Active</p>
            </div>
            <p class="text-zinc-400 text-xs mb-4 uppercase tracking-widest">User Profile Data</p>
            <div id="claims-display"
                class="bg-black/40 p-4 rounded-md text-[10px] font-mono text-emerald-300 overflow-auto max-h-48 mb-6">
            </div>
            <button onclick="logout()" class="text-xs text-zinc-500 hover:text-zinc-300 underline">Sign Out</button>
        </div>

        <div id="widget-container" class="dvWidget"></div>
    </div>

    <script>
        // Use the fallback if you ever change it in the backend
        const POLICY_ID = "53e36f1eacf651f2a80d2428cb5861ec";

        const UI = {
            loading: document.getElementById('loading-state'),
            guest: document.getElementById('guest-state'),
            auth: document.getElementById('auth-state'),
            claims: document.getElementById('claims-display'),
            widget: document.getElementById('widget-container')
        };

        /**
         * ON PAGE LOAD: Trigger the BFF Waterfall
         */
        window.onload = async () => {
            try {
                const response = await fetch('/auth/status', {
                    credentials: 'include'
                });
                const data = await response.json();

                UI.loading.classList.add('hidden');

                if (data.valid) {
                    console.log(`BFF Session Validated via: ${data.method}`);
                    showAuthenticatedState(data.user);
                } else {
                    UI.guest.classList.remove('hidden');
                }
            } catch (err) {
                console.error("BFF Check Failed:", err);
                UI.loading.innerHTML = '<p class="text-red-500 text-xs font-mono">BACKEND OFFLINE</p>';
            }
        };

        /**
         * SUCCESS HANDLER: Update UI with Claims
         */
        function showAuthenticatedState(user) {
            UI.auth.classList.remove('hidden');
            UI.claims.innerText = JSON.stringify(user, null, 2);
            
        }

        /**
         * LOGIN CLICK: Start DaVinci Flow
         */
        document.getElementById('loginBtn').addEventListener('click', async () => {
            UI.guest.classList.add('hidden');

            try {
                // A. Get Token from BFF
                const tokenRes = await fetch('/dvtoken', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ policyId: POLICY_ID })
                });
                const { token, companyId, apiRoot } = await tokenRes.json();

                // B. Render Widget
                const props = {
                    config: {
                        method: 'runFlow',
                        apiRoot: apiRoot,
                        accessToken: token,
                        companyId: companyId,
                        policyId: POLICY_ID
                    },
                    useModal: false,
                    successCallback: async (res) => {
                        console.log("Widget finished, handing off to BFF...");
                        
                        const loginRes = await fetch('/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sessionToken: res.additionalProperties.sessionToken })
                        });
                        if (loginRes.ok) window.location.reload();
                    },
                    errorCallback: (err) => {
                        console.error("Widget Error:", err);
                        UI.guest.classList.remove('hidden');
                    }
                };

                davinci.skRenderScreen(UI.widget, props);

            } catch (err) {
                console.error("Auth Initialization Failed:", err);
                UI.guest.classList.remove('hidden');
            }
        });

        /**
         * LOGOUT
         */
        async function logout() {
            await fetch('/auth/logout', { method: 'POST' });
            window.location.reload();
        }
    </script>
</body>

</html>
