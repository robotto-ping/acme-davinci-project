<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME // Secure Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://assets.pingone.eu/davinci/latest/davinci.js"></script>

    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }

        .glow:hover {
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }
    </style>
</head>

<body class="bg-black text-zinc-200 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="mb-12 text-center">
        <h1 class="text-4xl font-bold tracking-tighter text-white mb-2">
            ACME<span class="text-emerald-500">_</span>CORP
        </h1>
        <p class="text-zinc-500 text-sm uppercase tracking-widest">Secure Site</p>
    </div>

    <div class="w-full max-w-md border border-zinc-800 bg-zinc-900/50 p-8 rounded-2xl backdrop-blur-sm">
        <div class="mb-8">
            <h2 class="text-xl text-emerald-400 mb-2">Initialize Session</h2>
            <p class="text-zinc-400 text-sm">Please authenticate to access the secure console.</p>
        </div>

        <button id="loginBtn"
            class="glow w-full py-4 bg-emerald-500 text-black font-bold rounded-lg transition-all active:scale-95 hover:bg-emerald-400">
            LOGIN
        </button>

        <button id="statusBtn"
            class="glow w-full py-4 bg-emerald-500 text-black font-bold rounded-lg transition-all active:scale-95 hover:bg-emerald-400">
            STATUS
        </button>

        <div class="mt-8 pt-6 border-t border-zinc-800">
            <div class="flex items-center gap-2 text-xs text-zinc-600">
                <span class="inline-block w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                SYSTEMS OPERATIONAL
            </div>
        </div>
    </div>

    <div id="widget-container" class="dvWidget"></div>


    <footer class="mt-12 text-zinc-700 text-[10px] uppercase tracking-[0.2em]">
        Encrypted via PingOne DaVinci // BFF Pattern
    </footer>

    <script>
        const POLICY_ID = "53e36f1eacf651f2a80d2428cb5861ec"; // Policy ID is fine on frontend

        document.getElementById('statusBtn').addEventListener('click', async () => {

            try {
                // 1. Get token from our BFF
                const response = await fetch('/auth/status', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                 } catch (err) {
                console.error("BFF Connection Failed:", err);
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('loginBtn');
            btn.innerText = "INITIALISING...";

            try {
                // 1. Get token from our BFF
                const response = await fetch('/dvtoken', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ policyId: POLICY_ID })
                });

                const { token, companyId, apiRoot } = await response.json();

                const successCallback = async (response) => {
                    console.log("Success!", response);
                    var sessionToken = response.additionalProperties.sessionToken;
                    console.log("sessionToken!", sessionToken);
                    const saveResponse = await fetch('/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sessionToken: sessionToken
                        })
                    });
                };

                // 2. Initialize Widget
                const props = {
                    config: {
                        method: 'runFlow',
                        apiRoot: apiRoot,
                        accessToken: token,
                        companyId: companyId,
                        policyId: POLICY_ID,
                        staggerFlowExecutions: false
                    },
                    useModal: true,
                    successCallback: successCallback,

                    errorCallback: (err) => console.error("Widget Error:", err),
                    onCloseModal: () => console.log("Modal Closed")
                };

                // 3. Render
                davinci.skRenderScreen(document.getElementById('widget-container'), props);
                btn.style.display = 'none'; // Hide button once widget loads

            } catch (err) {
                console.error("BFF Connection Failed:", err);
            }
        });
    </script>
</body>

</html>
