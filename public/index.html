<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME // Secure Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; }
        .glow:hover { box-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
    </style>
</head>
<body class="bg-black text-zinc-200 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="mb-12 text-center">
        <h1 class="text-4xl font-bold tracking-tighter text-white mb-2">
            ACME<span class="text-emerald-500">_</span>CORP
        </h1>
        <p class="text-zinc-500 text-sm uppercase tracking-widest">Identity Gateway v1.0</p>
    </div>

    <div class="w-full max-w-md border border-zinc-800 bg-zinc-900/50 p-8 rounded-2xl backdrop-blur-sm">
        <div class="mb-8">
            <h2 class="text-xl text-emerald-400 mb-2">Initialize Session</h2>
            <p class="text-zinc-400 text-sm">Please authenticate to access the secure console.</p>
        </div>

        <button id="loginBtn" class="glow w-full py-4 bg-emerald-500 text-black font-bold rounded-lg transition-all active:scale-95 hover:bg-emerald-400">
            LAUNCH DAVINCI
        </button>

        <div class="mt-8 pt-6 border-t border-zinc-800">
            <div class="flex items-center gap-2 text-xs text-zinc-600">
                <span class="inline-block w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                SYSTEMS OPERATIONAL
            </div>
        </div>
    </div>

    <footer class="mt-12 text-zinc-700 text-[10px] uppercase tracking-[0.2em]">
        Encrypted via PingOne DaVinci // BFF Pattern
    </footer>

    <script>
        document.getElementById('loginBtn').addEventListener('click', () => {
            console.log("Redirecting to DaVinci flow...");
            alert("This is where the DaVinci Widget will trigger!");
        });
    </script>
</body>
</html>
